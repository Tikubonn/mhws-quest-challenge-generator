      function choiceRandom (sequence, weights){
        if (0 < sequence.length){
          let ws = weights || sequence.map(() => 1.0);
          let totalWeight = ws.reduce((a, b) => a + b);
          let accWeights = ws.map((_, i) => ws.slice(0, i + 1).reduce((a, b) => a + b));
          let rand = Math.random() * totalWeight;
          for (let i = 0; i < sequence.length; i++){
            if (rand < accWeights[i]){
              return sequence[i];
            }
          }
          return sequence[0];
        }
        else {
          throw new Error(sequence); //tmp.
        }
      }

      function choiceRandomChallenges (quest, maxCount, challenges){
        let count = Math.round(1 + Math.random() * (maxCount -1));
        let curCostCapacity = quest.costCapacity;
        let choosenChallenges = [];
        let choosenTags = new Set(quest.tags);
        for (let i = 0; i < count; i++){
          let avaliableChallenges = challenges.filter((c) => 
            !choosenChallenges.includes(c) && 
            choosenTags.intersection(c.excludeTags).size == 0 && 
            c.cost <= curCostCapacity
          );
          if (0 < avaliableChallenges.length){
            let challenge = choiceRandom(avaliableChallenges, avaliableChallenges.map((c) => c.weight));
            challenge.tags.keys().forEach((tag) => {
              choosenTags.add(tag);
            });
            choosenChallenges.push(challenge);
            curCostCapacity -= challenge.cost;
          }
        }
        return choosenChallenges;
      }

      class Text extends IRenderable {

        constructor (text, family, size, color){
          super();
          this.text = text 
          this.family = family 
          this.size = size 
          this.color = color
        }

        render (context, x, y){
          context.font = `bold ${this.size}px ${this.family}`;
          context.fontFeatureSettings = "palt";
          context.textAlign = "center";
          context.textBaseline = "top";
          context.fillStyle = "#000";

          const SAMPLE_COUNT = 32;
          const BORDER_WEIGHT = 3;

          for (let i = 0; i < SAMPLE_COUNT; i++){
            let rad = (i / (SAMPLE_COUNT -1.0) * Math.PI * 2.0);
            context.fillText(
              this.text, 
              x + Math.sin(rad) * BORDER_WEIGHT, 
              y + Math.cos(rad) * BORDER_WEIGHT
            );
          }

          context.fillStyle = this.color
          context.fillText(this.text, x, y);
        }

        calc_height (){
          return this.size;
        }

      }

      class Gap extends IRenderable {

        constructor (size){
          super();
          this.size = size;
        }

        render (context, x, y){
        }

        calc_height (){
          return this.size;
        }

      }

      function render (context, renderables, y){
        totalHeight = renderables.map((a) => a.calc_height()).reduce((a, b) => a + b);
        let x = 640 / 2.0;
        let y2 = y - totalHeight / 2.0;
        for (let renderable of renderables){
          renderable.render(context, x, y2);
          y2 += renderable.calc_height();
        }
      }

      function imageGenerate (callback){

          new Gap(8),
          new Text(`「${choosenQuest.name}」を`, FONT_FAMILY, 32, "#ff0"),
          new Gap(24),
        ]);
        choosenChallenges.forEach((c) => {

          renderables.push(new Gap(8));
        });
        renderables = renderables.concat([
          new Text("クリアしてください!!", FONT_FAMILY, 24, "#fff"),
        ]);
        context.drawImage(background, 0, 0, 640, 480);
        render(context, renderables, 280);
        let image = new Image();
        image.src = canvas.toDataURL();
        image.addEventListener("load", () => {
          callback(image);
        });
      }
