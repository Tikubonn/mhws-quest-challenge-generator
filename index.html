    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script>

      function loadTags (){
        const INPUT_IDS = [
          "tag-rank1",
          "tag-rank2",
          "tag-rank3",
          "tag-rank4",
          "tag-rank5",
          "tag-rank6",
          "tag-rank7",
          "tag-rank8",
          "tag-rank9",
          "tag-rank10",
          "tag-map-hedate",
          "tag-map-mori",
          "tag-map-yuwaki",
          "tag-map-dangai",
          "tag-map-touhou",
          "tag-map-atogata",
          "tag-map-atochi",
          "tag-map-yashiro",
          "tag-map-kaikyo",
          "tag-event",
          "tag-free",
          "tag-unavailable",
          "tag-weapon-limit",
          "tag-time-limit",
        ];
        return new Set(
          INPUT_IDS
            .map((id) => {
              let input = document.getElementById(id);
              if (input != null){
                return input.checked? input.value: "";
              }
              else {
                throw new Error(id); //tmp.
              }
            })
            .filter((value) => value)
            .reduce((a, b) => a.concat(b), [])
        );
      }

      function chooseQuest (allQuests, tags){
        let availableQuests = allQuests.filter((quest) => {
          return quest.tags.intersection(tags).size == quest.tags.size;
        });
        if (0 < availableQuests.length){
          let index = Math.round((availableQuests.length -1) * Math.random());
          return availableQuests[index];
        }
        else{
          alert("条件に一致するクエストが1つも見つかりませんでした。");
          return null;
        }
      }

      function chooseRandom (sequence, weights){ //重み付けを用いた無作為抽出を行います
        if (0 < sequence.length){
          let totalWeight = weights.reduce((a, b) => a + b, 0.0);
          let accWeights = weights.map((_, i) => weights.slice(0, i + 1).reduce((a, b) => a + b, 0.0));
          let rand = totalWeight * Math.random();
          let index = accWeights.findIndex((acc) => rand <= acc);
          if (0 <= index){
            return sequence[index];
          }
          else {
            return sequence[0];
          }
        }
        else {
          throw Error(sequence); //tmp.
        }
      }

      function chooseChallenge (allChallenges, quest, tags, costCapacity){
        let unifiedTags = quest.additional_tags.union(tags);
        let availableChallenges = allChallenges.filter((challenge) => {
          return challenge.tags.intersection(unifiedTags).size == challenge.tags.size && challenge.exclusive_tags.intersection(unifiedTags).size == 0 && challenge.cost <= costCapacity;
        });
        if (0 < availableChallenges.length){
          return chooseRandom(
            availableChallenges, 
            availableChallenges.map((challenge) => challenge.weight)
          );
        }
        else{
          return null;
        }
      }

      function chooseChallenges (allChallenges, quest, tags, maxCount){
        let curCostCapacity = quest.cost_capacity;
        let curTags = new Set(tags);
        let count = Math.round(maxCount * Math.random());
        return (new Array(count))
          .fill(null)
          .map(() => {
            let challenge = chooseChallenge(allChallenges, quest, curTags, curCostCapacity);
            if (challenge != null){
              curCostCapacity -= challenge.cost;
              curTags = curTags.union(challenge.additional_tags);
              return challenge;
            }
            else {
              return null;
            }
          })
          .filter((challenge) => challenge);
      }

      class IRenderable {

        async render (context, x, y){
        }

        calc_height (){
          throw new Error(); //tmp.
        }

      }

      class Text extends IRenderable {

        constructor (text, family, size, color){
          super();
          this.text = text 
          this.family = family 
          this.size = size 
          this.color = color
        }

        async render (context, x, y){
          context.font = `bold ${this.size}px ${this.family}`;
          context.fontFeatureSettings = "palt";
          context.textAlign = "center";
          context.textBaseline = "top";
          context.fillStyle = "#000";

          const SAMPLE_COUNT = 32;
          const BORDER_WEIGHT = 3;

          for (let i = 0; i < SAMPLE_COUNT; i++){
            let rad = (i / (SAMPLE_COUNT -1.0) * Math.PI * 2.0);
            context.fillText(
              this.text, 
              x + Math.sin(rad) * BORDER_WEIGHT, 
              y + Math.cos(rad) * BORDER_WEIGHT
            );
          }

          context.fillStyle = this.color
          context.fillText(this.text, x, y);
        }

        calc_height (){
          return this.size;
        }

      }

      class Targets extends IRenderable {

        constructor (targets){
          super();
          this.targets = targets;
        }

        async render (context, x, y){
          let offsetX = (100 * this.targets.length) / 2.0 + (100 / 2.0);
          return Promise.all(
            this.targets.map((target) => {
              return new Promise((resolve, reject) => {
                let image = new Image();
                if (iconTable.hasOwnProperty(target)){
                  var url = iconTable[target];
                }
                else {
                  var url = iconTable["???"];
                }
                image.src = url;
                image.addEventListener("load", () => {
                  resolve(image);
                });
                image.addEventListener("error", (event) => {
                  reject(event);
                });
              });
            })
          ).then((images) => {
            images.forEach((image, i) => {
              context.drawImage(
                image, 
                x + i * 100 + (100 / 2.0) - offsetX,
                y,
                100,
                100
              );
            });
          });
        }

        calc_height (){
          return 100;
        }

      }

      class Gap extends IRenderable {

        constructor (size){
          super();
          this.size = size;
        }

        async render (context, x, y){
        }

        calc_height (){
          return this.size;
        }

      }

      async function render (context, renderables, y){
        totalHeight = renderables.map((a) => a.calc_height()).reduce((a, b) => a + b);
        let x = 640 / 2.0;
        let y2 = y - totalHeight / 2.0;
        for (let renderable of renderables){
          await renderable.render(context, x, y2);
          y2 += renderable.calc_height();
        }
      }

      const FONT_FAMILY = "Meiryo";

      async function imageGenerate (callback){
        let background = document.getElementById("quest-background");
        let canvas = document.createElement("canvas");
        canvas.width = 640;
        canvas.height = 480;
        let context = canvas.getContext("2d");
        let renderables = [];
        let tags = loadTags();
        let quest = chooseQuest(allQuests, tags);
        let challenges = chooseChallenges(allChallenges, quest, tags, 2);
        if (0 < quest.targets.length){
          targets = new Targets(quest.targets);
          renderables = renderables.concat([
            targets,
            new Gap(24),
          ]);
        }
        renderables = renderables.concat([
          new Text(quest.tags.has("event")? "イベントクエスト": quest.tags.has("free")? "フリークエスト": "", FONT_FAMILY, 16, "#ff0"),
          new Gap(8),
        ]);
        renderables = renderables.concat([
          new Text(`「${quest.name}」を`, FONT_FAMILY, 32, "#ff0"),
          new Gap(24),
        ]);
        challenges.forEach((challenge) => {
          renderables.push(new Text(challenge.name, FONT_FAMILY, 24, "#fff"));
          renderables.push(new Gap(8));
        });
        renderables = renderables.concat([
          new Text("クリアしてください!!", FONT_FAMILY, 24, "#fff"),
        ]);
        context.drawImage(background, 0, 0, 640, 480);
        await render(context, renderables, 285);
        let image = new Image();
        image.src = canvas.toDataURL();
        image.addEventListener("load", () => {
          callback(image);
        });
      }

      let allQuests = [];
      let allChallenges = [];
      let iconTable = {};

      function loadJSONs (){
        return Promise.all([
          fetch("json/quests.json").then(async (response) => {
            allQuests = await response.json();
            allQuests = allQuests.map((quest) => {
              quest.tags = new Set(quest.tags);
              quest.additional_tags = new Set(quest.additional_tags);
              return quest;
            });
          }),
          fetch("json/challenges.json").then(async (response) => {
            allChallenges = await response.json();
            allChallenges = allChallenges.map((challenge) => {
              challenge.tags = new Set(challenge.tags);
              challenge.additional_tags = new Set(challenge.additional_tags);
              challenge.exclusive_tags = new Set(challenge.exclusive_tags);
              return challenge;
            });
          }),
          fetch("json/icons.json").then(async (response) => {
            iconTable = await response.json();
          }),
        ]);
      }

      window.addEventListener("load", () => {
        loadJSONs().then(() => {
          let button = document.getElementById("gen-image");
          button.addEventListener("click", async (event) => {
            event.preventDefault();
            await imageGenerate((image) => {
              image.id = "image-result";
              let divImageOut = document.getElementById("image-out");
              Array.from(divImageOut.childNodes).forEach((node) => node.parentNode.removeChild(node));
              divImageOut.appendChild(image);
            });
          });
        });
      });

    </script>
